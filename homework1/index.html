<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="./style.css">

    <title>
        Home Page
    </title>
</head>

<body>
    <header class="container-fluid bg-primary-custom text-white p-0">
        <div class="row align-content-center justify-content-center m-0">
            <img src="./clapperboard-64x64.png" alt="Film logo" class="mr-2">
            <h1>Retro Video Rentals</h1>
        </div>

        <nav class="navbar">
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <nav class="collapse navbar-collapse d-flex align-items-center justify-content-center" id="mainNavbar">
                <div class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-home"></i><span
                            class="d-none d-md-inline">Home</span></a></div>
                <div class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-film"></i><span
                            class="d-none d-md-inline">Movies</span></a></div>
                <div class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-users"></i><span
                            class="d-none d-md-inline">Customers</span></a></div>
                <div class="nav-item"><a class="nav-link" href="#"><i class="fa-solid fa-calendar-check"></i><span
                            class="d-none d-md-inline">Contact</span></a></div>
            </nav>
        </nav>


    </header>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
        crossorigin="anonymous"></script>
</body>

</html>

    <link rel="stylesheet" type="text/css" href="./style.css">

    <title>
        New Rental
    </title>
</head>

<body class="font-weight-bold">
    <!--Header: Navbar_col [logo+title+toggle][navbar links]-->
    <nav class="navbar navbar-expand-sm navbar-dark bg-primary-custom mb-2 flex-column" id="mainNavbar">
        <div class="d-flex align-items-center justify-content-center w-100">
            <a class="navbar-brand d-flex align-items-center mb-0" href="index.html">
                <img src="./clapperboard-64x64.png" alt="Film logo" class="mr-2">
                <span class="h1 mb-0 text-white">Retro Video Rentals</span>
            </a>

            <button class="navbar-toggler ml-auto" type="button" data-toggle="collapse" data-target="#navbarLinks"
                aria-controls="navbarLinks" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <div class="collapse navbar-collapse w-100 mt-2 mt-sm-0" id="navbarLinks">
            <ul class="navbar-nav w-100 justify-content-around text-center">
                <li class="nav-item">
                    <a class="nav-link text-white" href="index.html"><i class="fa-solid fa-home mr-2"></i>Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="Movies.html"><i class="fa-solid fa-film mr-2"></i>Movies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="customers.html"><i
                            class="fa-solid fa-users mr-2"></i>Customers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="rentals.html"><i
                            class="fa-solid fa-calendar-check mr-2"></i>Rentals</a>
                </li>
            </ul>
        </div>

    </nav>

    <!--Main page Contents -->
    <main class="container-fluid px-4 my-0 d-flex flex-column flex-grow-1">
        <h2>Add New Rental</h2>
        <form>
            <div class="row align-items-center mb-2">
                <div class="col-sm-2">
                    <label for="Customer">Customer:</label>
                </div>
                <div class="col">
                    <select id="Customer" name="Customer" class="form-control" placeholder="select ustomer">
                        <option disabled selected>select a custromer</option>
                        <option><b>Maria Lopez</b></option>
                        <option><b>James Smith</b></option>
                        <option><b>Linda Chen</b></option>
                        <option><b>Robert Brown</b></option>
                    </select>
                </div>
            </div>

            <div class="row align-items-center mb-2">
                <div class="col-sm-2">
                    <label for="Movie">Movie:</label>
                </div>
                <div class="col">
                    <select id="Movie" name="Movie" class="form-control" placeholder="select ustomer">
                        <option disabled selected>select a Movie</option>
                        <option><b>The Last Mission</b></option>
                        <option><b>Space Friends</b></option>
                        <option><b>A Quiet Road</b></option>
                        <option><b>Laugh Out Loud</b></option>
                    </select>
                </div>
            </div>

            <div class="row align-items-center mb-2">
                <div class="col-sm-2">
                    <label for="Duration">Duration:</label>
                </div>
                <div class="col">
                    <select id="Movie" name="Movie" class="form-control">
                        <option><b>1 day</b></option>
                        <option><b>2 days</b></option>
                        <option disabled selected><b>3 days</b></option>
                        <option><b>4 days</b></option>
                        <option><b>5 days</b></option>
                        <option><b>6 days</b></option>
                    </select>
                </div>
            </div>

            <div class="row align-items-center mb-2">
                <div class="col-sm-2">
                    <label for="Pickup">Pickup Date:</label>
                </div>
                <div class="col">
                    <input type="date" id="pickup" name="pickup" class="form-control">
                    </select>
                </div>
            </div>
        </form>

        <div class="row align-items-center">
            <div class="col m-3 d-flex flex-column flex-sm-row gap-3SS justify-content-center align-items-center">
                <button class="btn btn-success btn-width mb-2 mr-sm-2">
                    <i class="fa-solid fa-calendar-plus d-inline d-sm-none"></i>
                    Add Rental
                </button>
                <button class="btn btn-secondary btn-width mb-2">
                    <i class="fa-solid fa-xmark d-inline d-sm-none"></i>
                    Cancel
                </button>
            </div>
        </div>
    </main>

    <!--footer-->
    <footer class="bg-dark-custom text-white text-center p-3 w-100">

        </p>
    </footer>

        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
</body>

</html>
